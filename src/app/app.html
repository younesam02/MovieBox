<main class="app-shell">
  <section class="hero">
    <h1>{{ appTitle }}</h1>
    <p class="subtitle">
      Découvrez une sélection de films populaires et ajoutez vos préférés.
    </p>
  </section>

  <app-favorites-counter></app-favorites-counter>

  <section class="movies-section">
    <div class="section-header">
      <h2>Films recommandés</h2>
      <p>{{ movies.length }} films disponibles</p>
    </div>

    <div class="movies-grid">
      @for (movie of movies; track movie.id) {
        <app-movie-card [movie]="movie"></app-movie-card>
      }
    </div>
  </section>
</main>
